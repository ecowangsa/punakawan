<html lang="en">

<title>Punakawan Council - Deliberation Simulation</title>

<style>
  :root{
    --night:#140d09; --ember:#cf6a35; --gold:#e8b04b; --gold-bright:#f6d489;
    --kelir:#f1e4c6; --kelir-warm:#f6dda8; --maroon:#5e1f15; --ink:#2a1a10;
    --cream:#efe2c2; --muted:#caa978;
    --c-restraint:#e3c168; --c-consumer:#6fc0d2; --c-contrarian:#d5563a;
    --c-threat:#c77dd0; --c-cost:#e8954b; --c-scale:#d39a5a;
    --c-evolution:#7bbf9a; --c-obligation:#8fb0d6; --c-operability:#5fbfa0;
    --c-semar:#f7dd93;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;margin:0}
  body{font-family:'Spectral',Georgia,serif;color:var(--cream);overflow:hidden;position:relative;
    background:radial-gradient(120% 80% at 50% -10%, #3a2415 0%, rgba(58,36,21,0) 55%), radial-gradient(90% 70% at 50% 120%, #2a1a12 0%, rgba(20,13,9,0) 60%), linear-gradient(180deg,#0d0805 0%,#160e09 50%,#0c0704 100%)}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.05;z-index:0;
    background:repeating-linear-gradient(125deg, var(--gold) 0 2px, transparent 2px 22px);mix-blend-mode:overlay}
  body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:60;opacity:.06;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>")}
  .app{height:100vh;display:flex;flex-direction:column;gap:10px;padding:14px clamp(12px,3vw,28px);box-sizing:border-box}
  .appbar{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
  .brand{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
  .brand h1{font-family:'Cinzel Decorative',serif;font-weight:900;font-size:clamp(1.3rem,2.6vw,1.9rem);margin:0;color:var(--gold-bright);text-shadow:0 0 22px rgba(232,176,75,.3)}
  .brand .sub{font-style:italic;color:var(--muted);font-size:.85rem}
  .lakontag{display:flex;align-items:center;gap:8px;font-family:'Marcellus';font-size:.8rem;color:var(--gold-bright);white-space:nowrap}
  .livedot{width:9px;height:9px;border-radius:50%;background:var(--c-contrarian);animation:livep 1.8s infinite;flex:0 0 auto}
  @keyframes livep{0%{box-shadow:0 0 0 0 rgba(213,86,58,.55)}70%{box-shadow:0 0 0 8px rgba(213,86,58,0)}100%{box-shadow:0 0 0 0 rgba(213,86,58,0)}}
  /* context (pinned topic) */
  .context{flex:0 0 auto;display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;
    background:linear-gradient(180deg,#2a1b12,#20140d);border:1px solid rgba(232,176,75,.3);border-left:4px solid var(--gold);border-radius:10px;padding:10px 16px}
  .context .lbl{font-family:'Marcellus';letter-spacing:.12em;text-transform:uppercase;font-size:.62rem;color:var(--ember);flex:0 0 auto}
  .context .q{font-size:.98rem;color:var(--gold-bright);line-height:1.4}
  .context .srcnote{font-size:.7rem;font-style:italic;color:var(--muted);margin-left:auto;display:flex;align-items:center;gap:6px;white-space:nowrap}
  .context .srcnote.real{color:var(--c-evolution)}
  .srcdot{width:7px;height:7px;border-radius:50%;background:currentColor;flex:0 0 auto}

  .avatar{width:46px;height:46px;flex:0 0 auto;border-radius:50%;display:grid;place-items:center;
    background:radial-gradient(circle at 50% 35%, color-mix(in srgb,var(--rc) 35%,#241712), #1a110b 75%);
    border:2px solid var(--rc);box-shadow:0 0 14px color-mix(in srgb,var(--rc) 45%,transparent)}
  .avatar svg{width:26px;height:40px;color:var(--rc)}
  .avatar .aimg{width:100%;height:100%;border-radius:50%;object-fit:cover;object-position:50% 12%}
  .avatar[data-role="semar"] .aimg{object-position:50% 20%}
  svg.figdef{position:absolute;width:0;height:0}
  /* respect reduced-motion preference */
  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{animation:none!important;transition:none!important}
  }
  .bmock{flex:1 1 auto;min-height:0;display:flex;gap:0;border:1px solid #3a2a18;border-radius:12px;overflow:hidden;box-shadow:0 16px 44px rgba(0,0,0,.5)}
  .bcanvas{flex:1.6;position:relative;overflow:hidden;
    background:radial-gradient(120% 80% at 50% -10%, #3a2415 0%, rgba(58,36,21,0) 55%), linear-gradient(180deg,#160e09,#0c0704)}
  .bcanvas::before{content:"";position:absolute;inset:0;pointer-events:none;opacity:.5;
    background-image:radial-gradient(#2a2013 1px,transparent 1px);background-size:15px 15px}
  .bcanvas::after{content:"";position:absolute;inset:0;pointer-events:none;opacity:.05;
    background:repeating-linear-gradient(125deg,#e8b04b 0 2px,transparent 2px 22px)}
  #graph{display:block;width:100%;height:100%}
  .gnode{cursor:pointer;transition:opacity .4s}
  .gnode.dim{opacity:.3}
  .gnode .box{fill:#241a10;stroke:#6b4f2a;stroke-width:1.5}
  .gnode.gold .box{fill:#e8b04b;stroke:#e8b04b}
  .gnode.sel .box{stroke:#e3c168;stroke-width:2.5}
  .gnode.think .box{stroke-dasharray:5 3;animation:gpulse 1.3s infinite}
  @keyframes gpulse{0%,100%{opacity:.55}50%{opacity:1}}
  .gnode text{font-family:'Marcellus',serif;fill:#e8c074}
  .gnode.gold text{fill:#241a10;font-weight:700}
  .gedge{stroke:#5a432a;stroke-width:1.5;fill:none}
  .legend{position:absolute;left:0;right:0;bottom:0;padding:6px 12px;font:600 .58rem/1.4 system-ui;color:#caa978;
    background:linear-gradient(180deg,rgba(12,7,4,0),rgba(12,7,4,.85))}
  .bpanel{flex:1;min-width:240px;background:linear-gradient(180deg,#241712,#1b110c);
    border-left:1px solid rgba(232,176,75,.3);padding:18px;color:#efe2c2;overflow:auto}
  .bpanel .who{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .bpanel .who .avatar{width:40px;height:40px}
  .bpanel h3{font-family:'Cinzel Decorative',serif;color:#e3c168;margin:0;font-size:1.15rem;line-height:1}
  .bpanel .role{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:#caa978}
  .pchip{margin-left:auto;font:600 .6rem/1 'Marcellus',serif;letter-spacing:.08em;text-transform:uppercase;
    padding:4px 10px;border-radius:999px;border:1px solid var(--pc,#caa978);color:var(--pc,#caa978)}
  .ptext{font-size:1.02rem;line-height:1.55;margin-top:8px}
  .ptext .lead{color:#f6d489;font-weight:600}
  .pverdict{list-style:none;margin:10px 0 0;padding:0;display:grid;gap:7px}
  .pverdict li{display:flex;gap:9px;font-size:.96rem;line-height:1.45}
  .pverdict .num{font-family:'Cinzel Decorative',serif;color:#f6d489;min-width:1.3em}
  .foot{flex:0 0 auto;display:flex;align-items:center;gap:14px}
  .foot .progress{flex:1;height:5px;background:rgba(232,176,75,.16);border-radius:999px;overflow:hidden}
  .foot .progress .fill{height:100%;width:0;background:linear-gradient(90deg,var(--ember),var(--gold-bright));transition:width .4s;box-shadow:0 0 12px var(--gold)}
  .beatlabel{flex:0 0 auto;font-family:'Marcellus';font-size:.72rem;color:var(--muted);letter-spacing:.06em;white-space:nowrap}
  @media (max-width:700px){
    .app{padding:10px 12px;gap:8px}
    .bmock{flex-direction:column}
    .bcanvas{flex:1 1 55%;min-height:200px}
    .bpanel{flex:1 1 45%;min-height:150px;border-left:none;border-top:1px solid rgba(232,176,75,.3)}
    .brand .sub{display:none}
  }
</style>

<script>
const NS="http://www.w3.org/2000/svg";
const ROLES = {
  semar:       {nm:"Semar",     en:"Synthesizer",        lbl:"Semar",       c:"--c-semar",       p:"wy-semar"},
  restraint:   {nm:"Gareng",    en:"Restraint Keeper",   lbl:"Restraint",   c:"--c-restraint",   p:"wy-semar"},
  consumer:    {nm:"Petruk",    en:"Consumer Advocate",  lbl:"Consumer",    c:"--c-consumer",    p:"wy-alus"},
  contrarian:  {nm:"Bagong",    en:"The Contrarian",     lbl:"Contrarian",  c:"--c-contrarian",  p:"wy-semar"},
  threat:      {nm:"Bima",      en:"Threat Modeler",     lbl:"Threat",      c:"--c-threat",      p:"wy-gagah"},
  cost:        {nm:"Arjuna",    en:"Cost Realist",       lbl:"Cost",        c:"--c-cost",        p:"wy-alus"},
  scale:       {nm:"Sadewa",    en:"Scale Forecaster",   lbl:"Scale",       c:"--c-scale",       p:"wy-alus"},
  evolution:   {nm:"Kresna",    en:"Change Steward",     lbl:"Evolution",   c:"--c-evolution",   p:"wy-gagah"},
  obligation:  {nm:"Puntadewa", en:"Obligation Officer", lbl:"Obligation",  c:"--c-obligation",  p:"wy-alus"},
  operability: {nm:"Gatotkaca", en:"Operability Watch",  lbl:"Operability", c:"--c-operability", p:"wy-gagah"},
};
const PHASES = ["Opening","Convene","Opinion","Gate","Debate","Verdict"];

const SCENARIOS = {
  evolusi: {
    title:"A deliberation: the council mends its own rules",
    topik:"The Punakawan council wants to improve how it deliberates - better, but not bloated. What should change?",
    beats:[
      {phase:1, role:null, badge:"Opening", text:`The council convenes. Five advisors take their seats - **Restraint** (Gareng), **Change Steward** (Kresna), **Consumer Advocate** (Petruk), **Scale Forecaster** (Sadewa), and the blunt **Contrarian** (Bagong) - each pressing one angle.`},
      {phase:2, role:"restraint", badge:"Opinion", tag:"firm", text:`**Don't add new rules.** Fewer rules, easier to use. A lot of what exists could simply be deleted.`},
      {phase:2, role:"evolution", badge:"Opinion", tag:"lean", text:`The real defect: the rules are **written many times, in many places**, until they contradict each other. Write them once, in one home. Fix that first.`},
      {phase:2, role:"consumer", badge:"Opinion", tag:"firm", text:`For whoever reads the result: **put the verdict at the very top.** Don't make people read a wall of text before they find the answer.`},
      {phase:2, role:"scale", badge:"Opinion", tag:"lean", text:`Don't always debate at length. When everyone already agrees, **conclude immediately**. Debate only when there is a genuine split - save the time.`},
      {phase:2, role:"contrarian", badge:"Opinion", tag:"shaky", text:`Careful: the five of us share the same "brain." We can look like we agree **not because we are right, but because we reason alike.** And a "78 out of 100" confidence number is misleading - it looks precise but it is just a guess.`},
      {phase:3, role:null, badge:"Gate", gong:"Semar Sifts", text:`Semar weighs the opinions. Nearly all point one way: **"simplify, don't add."** But two things still split us: cut down to how many voices? drop the confidence number or not? So the debate continues on those two.`},
      {phase:4, role:"contrarian", badge:"Debate", tag:"changed", changed:true, text:`I **withdraw** my earlier idea (cut to just two voices) - that is only another tool we already have. The Scale Forecaster's way is better. But on the confidence number, I **hold**: drop it.`},
      {phase:4, role:"evolution", badge:"Debate", tag:"changed", changed:true, text:`I **revise**: not merge into one file, but give each thing one clear "home." What I **hold**: tidy up before adding anything.`},
      {phase:4, role:"restraint", badge:"Debate", tag:"changed", changed:true, text:`I **turn around**: agreed, the confidence number should go - the Contrarian is right, it is a guess dressed up as a number. What I **hold**: reject every new addition.`},
      {phase:4, role:"scale", badge:"Debate", tag:"holds", text:`I **hold**: debate only when there is a split, and the contrarian **must always speak** even when everyone agrees - insurance against being wrong together.`},
      {phase:4, role:"consumer", badge:"Debate", tag:"changed", changed:true, text:`I drop the "ask permission mid-run" idea. The 0-100 number I replace with three simple bands: **firm / lean / shaky**. What I **hold**: verdict at the top.`},
      {phase:5, role:"semar", badge:"Verdict", text:`I decide - not by counting the most votes. The irony: the best way to improve this council is to **simplify and sharpen**, not add. Seven changes:`,
        list:["Each rule lives in one place - never repeated until it conflicts.",
          "Define \"skip\" clearly: when to hold no meeting at all, when to skip only the debate.",
          "Drop the 0-100 number; use three bands: firm / lean / shaky - plus \"what would change this view.\"",
          "Debate only when there is a split; if everyone agrees, conclude.",
          "The contrarian always speaks; if it dissents, show its voice in full.",
          "Put the verdict at the top; keep the wayang names as the brand.",
          "Hold back - don't add what isn't needed."]},
      {phase:5, role:"semar", badge:"Verdict", text:`**Certainty: firm.** Remember: "four of five agree" is not a vote won - they just happen to think the same way. The council is closed.`}
    ]
  }
};

function makeIcon(href){const svg=document.createElementNS(NS,"svg");const use=document.createElementNS(NS,"use");use.setAttribute("href",href);svg.appendChild(use);return svg;}
function renderRich(container, str){
  container.textContent="";
  const parts=str.split(/(\*\*[^*]+\*\*|\*[^*]+\*)/g);
  for(const p of parts){
    if(!p) continue;
    if(p.startsWith("**")&&p.endsWith("**")){const s=document.createElement("span");s.className="lead";s.textContent=p.slice(2,-2);container.appendChild(s);}
    else if(p.startsWith("*")&&p.endsWith("*")){const e=document.createElement("em");e.textContent=p.slice(1,-1);container.appendChild(e);}
    else container.appendChild(document.createTextNode(p));
  }
}
function cssVar(v){return getComputedStyle(document.documentElement).getPropertyValue(v).trim();}

function layout(upto){
  const W=460, nodes=[], edges=[]; const lenses=[], debates=[]; let qi=-1, gi=-1, vi=-1;
  for(let k=0;k<=upto && k<BEATS.length;k++){ const b=BEATS[k];
    if(b.phase===1 || (b.phase==null && qi<0 && !b.role)) qi=k;
    else if(b.phase===2 && b.role) lenses.push(k);
    else if(b.phase===3) gi=k;
    else if(b.phase===4 && b.role) debates.push(k);
    else if(b.phase===5 && b.role==="semar" && vi<0) vi=k; }
  const N=(i,kind)=>{const b=BEATS[i];return {i,kind,role:b.role,pending:!!b.pending,tag:b.tag||""};};
  let y=14;
  if(qi>=0){ const n=N(qi,"q"); Object.assign(n,{x:110,y,w:240,h:34}); nodes.push(n); y+=46; }
  if(lenses.length){ const n=lenses.length,gap=8,wEach=Math.min(74,(W-(n+1)*gap)/n),tot=n*wEach+(n-1)*gap,x0=(W-tot)/2;
    lenses.forEach((bi,j)=>{ const nd=N(bi,"lens"); Object.assign(nd,{x:x0+j*(wEach+gap),y,w:wEach,h:54}); nodes.push(nd);
      if(qi>=0) edges.push({x1:230,y1:48,x2:nd.x+nd.w/2,y2:y}); }); y+=54+22; }
  if(gi>=0){ const n=N(gi,"gate"); Object.assign(n,{x:180,y,w:100,h:30}); nodes.push(n);
    nodes.filter(d=>d.kind==="lens").forEach(d=>edges.push({x1:d.x+d.w/2,y1:d.y+d.h,x2:230,y2:y})); y+=30+22; }
  if(debates.length){ const n=debates.length,gap=12,wEach=Math.min(110,(W-(n+1)*gap)/n),tot=n*wEach+(n-1)*gap,x0=(W-tot)/2;
    const gate=nodes.find(d=>d.kind==="gate");
    debates.forEach((bi,j)=>{ const nd=N(bi,"debate"); Object.assign(nd,{x:x0+j*(wEach+gap),y,w:wEach,h:24}); nodes.push(nd);
      if(gate) edges.push({x1:230,y1:gate.y+gate.h,x2:nd.x+nd.w/2,y2:y}); }); y+=24+22; }
  if(vi>=0){ const n=N(vi,"verdict"); Object.assign(n,{x:104,y,w:252,h:46}); nodes.push(n);
    const prev=nodes[nodes.length-2]; if(prev) edges.push({x1:230,y1:prev.y+prev.h,x2:230,y2:y}); y+=46+10; }
  return {nodes, edges, w:W, h:Math.max(y+10,120)};
}
const SVGNS="http://www.w3.org/2000/svg";
function svgEl(t,attrs){const e=document.createElementNS(SVGNS,t);for(const k in attrs)e.setAttribute(k,attrs[k]);return e;}
function gtext(x,y,s,size,anchor,fill){const t=svgEl("text",{x,y,"font-size":size,"text-anchor":anchor||"start"});
  if(fill)t.setAttribute("fill",fill); t.textContent=s; return t;}
function shortStance(b){ const t=(b.tag||"").replace(/yakin:\s*/i,""); return t||(b.pending?"thinking...":""); }
function renderGraph(upto, activeIdx, thinkingIdx){
  const g=els.graph, L=layout(BEATS.length-1);
  g.setAttribute("viewBox",`0 0 ${L.w} ${L.h}`);
  while(g.firstChild) g.removeChild(g.firstChild);
  L.edges.forEach(e=> g.appendChild(svgEl("path",{class:"gedge",
    d:`M${e.x1} ${e.y1} C ${e.x1} ${(e.y1+e.y2)/2}, ${e.x2} ${(e.y1+e.y2)/2}, ${e.x2} ${e.y2}`})));
  L.nodes.forEach(n=>{ const b=BEATS[n.i], r=ROLES[n.role]||{nm:n.role,c:"--gold-bright"};
    const cls="gnode"+((n.kind==="gate"||n.kind==="verdict")?" gold":"")
      +(n.i===activeIdx?" sel":"")+((n.pending||n.i===thinkingIdx)?" think":"")+(n.i>activeIdx?" dim":"");
    const grp=svgEl("g",{class:cls}); grp.dataset.i=n.i; grp.addEventListener("click",()=>selectBeat(n.i));
    grp.appendChild(svgEl("rect",{class:"box",x:n.x,y:n.y,width:n.w,height:n.h,rx:8}));
    const cx=n.x+n.w/2;
    if(n.kind==="q") grp.appendChild(gtext(cx,n.y+22,(b.topikShort||"Question"),11,"middle"));
    else if(n.kind==="lens"){ const cx2=n.x+n.w/2;
      grp.appendChild(svgEl("circle",{cx:cx2,cy:n.y+15,r:8,fill:cssVar(r.c)}));
      grp.appendChild(gtext(cx2,n.y+33,(r.lbl||r.en||n.role),9,"middle"));
      const s=shortStance(b); if(s) grp.appendChild(gtext(cx2,n.y+47,s,7.5,"middle","#caa978")); }
    else if(n.kind==="debate") grp.appendChild(gtext(cx,n.y+16,"debate: "+(r.lbl||r.en||n.role),8,"middle"));
    else if(n.kind==="gate") grp.appendChild(gtext(cx,n.y+20,"GATE",10,"middle"));
    else if(n.kind==="verdict"){ grp.appendChild(svgEl("circle",{cx:n.x+24,cy:n.y+23,r:14,fill:"#7a5a1f"}));
      grp.appendChild(gtext(n.x+24,n.y+27,"Semar",8,"middle","#f6d489"));
      const tv=gtext(n.x+46,n.y+22,"SEMAR'S VERDICT",10.5,"start","#241a10"); tv.setAttribute("font-weight","700"); grp.appendChild(tv);
      grp.appendChild(gtext(n.x+46,n.y+37,"Certainty: "+(b.tag||"-"),8,"start","#3a2410")); }
    g.appendChild(grp); });
}

const CERT_COLOR={firm:"#7bbf9a",lean:"#d39a5a",shaky:"#d5563a",mantap:"#7bbf9a",condong:"#d39a5a",ragu:"#d5563a"};
function renderPanel(i){ const b=BEATS[i]; els.panel.textContent=""; if(!b) return;
  const r=ROLES[b.role]||{nm:b.role||"Council",en:"",c:"--gold-bright",p:"wy-alus"};
  const who=document.createElement("div"); who.className="who";
  if(b.role) who.appendChild(avatarEl(b.role));
  const h=document.createElement("div");
  const nm=document.createElement("h3"); nm.textContent=b.role?(r.en||r.nm):(b.badge||"Council"); h.appendChild(nm);
  if(b.role){const ro=document.createElement("div");ro.className="role";ro.textContent=r.nm;h.appendChild(ro);}
  who.appendChild(h);
  if(b.tag){const c=document.createElement("span");c.className="pchip";
    const key=(b.tag||"").toLowerCase().replace(/[^a-z]/g,"");
    c.style.setProperty("--pc",CERT_COLOR[key]||"#caa978"); c.textContent=b.tag; who.appendChild(c);}
  els.panel.appendChild(who);
  const tx=document.createElement("div"); tx.className="ptext"; renderRich(tx,b.text||""); els.panel.appendChild(tx);
  if(b.list){const ul=document.createElement("ul");ul.className="pverdict";
    b.list.forEach((t,k)=>{const li=document.createElement("li");const num=document.createElement("span");num.className="num";num.textContent=k+1;
      const s=document.createElement("span");s.textContent=t;li.appendChild(num);li.appendChild(s);ul.appendChild(li);}); els.panel.appendChild(ul);}
}

let selectedIdx=-1;
function selectBeat(i){ selectedIdx=i; renderPanel(i);
  els.graph.querySelectorAll(".gnode").forEach(g=>g.classList.toggle("sel",+g.dataset.i===i)); }
function selectVerdictIfDone(){ const v=BEATS.findIndex(b=>b.phase===5&&b.role==="semar"); if(v>=0) selectBeat(v); }

// roles with a generated wayang PNG; the rest use the themed SVG silhouette.
const HAS_PNG = new Set(["semar","threat","cost","evolution","restraint","scale","consumer","operability","obligation","contrarian"]);
// avatar: prefer generated PNG (assets/wayang/<role>.png) when one exists, else
// the SVG silhouette. Roles without a PNG skip the fetch entirely - no 404, no
// momentarily-blank avatar.
function avatarEl(roleId){
  const r=ROLES[roleId]||{nm:roleId||"?",c:"--gold-bright",p:"wy-alus"};
  const wrap=document.createElement("div"); wrap.className="avatar"; wrap.dataset.role=roleId; wrap.style.setProperty("--rc",cssVar(r.c));
  if(!HAS_PNG.has(roleId)){ wrap.appendChild(makeIcon("#"+r.p)); return wrap; }
  const img=document.createElement("img"); img.className="aimg"; img.alt="Wayang figure: "+(r.nm||roleId);
  img.onerror=()=>{ img.remove(); if(!wrap.querySelector("svg")) wrap.appendChild(makeIcon("#"+r.p)); };
  img.src="assets/wayang/"+roleId+".png";
  wrap.appendChild(img); return wrap;
}
/* ---- DOM ---- */
const els={
  topik:document.getElementById("topik"), fill:document.getElementById("fill"), beatlabel:document.getElementById("beatlabel"),
  lakonTitle:document.getElementById("lakonTitle"), topikEl:document.getElementById("topik"), srcnote:document.getElementById("srcnote"),
  graph:document.getElementById("graph"), panel:document.getElementById("panel"), legend:document.getElementById("legend"),
};

let BEATS=[], idx=0, playing=false, timer=null;

function renderUpTo(i){ const b=BEATS[i];
  document.querySelectorAll(".phase").forEach(p=>{const pi=+p.dataset.i;p.classList.toggle("active",pi===b.phase);p.classList.toggle("done",pi<b.phase);});
  renderGraph(i, i, null); selectBeat(i);
  els.legend.textContent="Gold = gate/verdict - dashed = thinking - click a node to read its argument";
  els.fill.style.width=(BEATS.length>1?(i/(BEATS.length-1)*100):100)+"%";
  els.beatlabel.textContent=`Part ${i+1} / ${BEATS.length} - ${PHASES[b.phase]||b.badge||""}`;
}

let everLive=false, sig=null;
const TYPE_MS=520;
function setNote(text, real){
  els.srcnote.className="srcnote"+(real?" real":"");
  els.srcnote.textContent="";
  if(text){const d=document.createElement("span");d.className="srcdot";els.srcnote.appendChild(d);els.srcnote.appendChild(document.createTextNode(text));}
}
function renderThinking(ni){ const b=BEATS[ni];
  document.querySelectorAll(".phase").forEach(p=>{const pi=+p.dataset.i;p.classList.toggle("active",pi===b.phase);p.classList.toggle("done",pi<b.phase);});
  renderGraph(ni, ni, ni); selectBeat(ni);
  els.legend.textContent="Gold = gate/verdict - dashed = thinking - click a node to read its argument";
}
function beatDuration(i){const b=BEATS[i];const len=(b.text||"").replace(/[*]/g,"").length+(b.list?b.list.join("").length:0);return Math.min(3800,900+len*12+(b.list?b.list.length*150:0));}
function atEnd(){return idx>=BEATS.length-1;}
function setPlayBtn(on){ /* no play button - autoplay only */ }
function step(){
  if(!playing)return;
  if(atEnd()){stop();return;}
  const ni=idx+1, b=BEATS[ni];
  if(b.role && !b.pending){ renderThinking(ni); timer=setTimeout(()=>{ idx=ni; renderUpTo(idx); queue(); }, TYPE_MS); }
  else { idx=ni; renderUpTo(idx); queue(); }
}
function queue(){ clearTimeout(timer); if(!playing)return; if(atEnd()){stop();return;} timer=setTimeout(step, beatDuration(idx)); }
function play(){ if(!BEATS.length)return; if(atEnd())idx=0; playing=true; setPlayBtn(true); renderUpTo(idx); queue(); }
function stop(){ playing=false; setPlayBtn(false); clearTimeout(timer); }
function toggle(){ playing?stop():play(); }
function restart(){ stop(); idx=0; play(); }

function onData(d, isSample){
  const ns=JSON.stringify([d.status||"", (d.beats||[]).map(b=>[b.role,b.pending?1:0,(b.text||"").length,b.tag||""])]);
  if(ns===sig) return; sig=ns;
  BEATS=Array.isArray(d.beats)?d.beats:[];
  const q=BEATS.find(b=>b.phase===1||(b.phase==null&&!b.role));
  if(q) q.topikShort=(d.topik||"").slice(0,42)+((d.topik||"").length>42?"...":"");
  els.topik.textContent=d.topik||"";
  els.lakonTitle.textContent=d.title||"Punakawan Council";
  if(d.status==="running"){
    everLive=true; setNote("Deliberation in progress - live.", true);
    stop(); idx=Math.max(0,BEATS.length-1); if(BEATS.length) renderUpTo(idx);
  } else if(everLive){
    setNote("Deliberation complete.", true);
    stop(); idx=Math.max(0,BEATS.length-1); if(BEATS.length) renderUpTo(idx);
    selectVerdictIfDone();
  } else {
    setNote(isSample?"Showing a sample deliberation. Run Punakawan to watch a real one here.":"Live deliberation - loaded from sidang.json.", !isSample);
    idx=0; play();
  }
}
function poll(){
  fetch("sidang.json?ts="+Date.now(),{cache:"no-store"}).then(r=>{if(!r.ok)throw 0;return r.json();})
    .then(d=>{ if(d&&Array.isArray(d.beats)) onData(d,false); })
    .catch(()=>{ if(sig===null) onData(SCENARIOS.evolusi, true); });
}

// Poll for a live run only when explicitly asked (`?live=1`, set by
// `preview.sh start --live` when a real deliberation is about to be written to
// sidang.json). In every showcase context - a standalone copy, a static
// deploy, or `preview.sh start` without the flag - there is no run to wait for,
// so render the bundled sample once and skip polling, keeping the console clean.
var LIVE = new URLSearchParams(location.search).has("live");
if(LIVE){
  poll();
  setInterval(poll, 2000);
}else{
  onData(SCENARIOS.evolusi, true);
}
</script>
